<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MonAide-VD — Simulateur d’aides sociales dans le canton de Vaud</title>
  <desc id="desc">Visuel de partage pour MonAide-VD, un outil communautaire pour repérer des aides sociales, ressources et démarches utiles dans le canton de Vaud.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf5ee"/>
      <stop offset="100%" stop-color="#f4ede4"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdfa"/>
      <stop offset="100%" stop-color="#f8f0e7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#3a312b" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1070" cy="86" r="170" fill="#f7e8db" opacity="0.7"/>
  <circle cx="132" cy="566" r="220" fill="#eef4ef" opacity="0.75"/>

  <g filter="url(#shadow)">
    <rect x="72" y="72" width="1056" height="486" rx="34" fill="url(#panel)" stroke="#e8ddd2" stroke-width="2"/>
  </g>

  <g transform="translate(110 118)">
    <text x="0" y="0" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="2" fill="#c04820">MONAIDE<tspan fill="#2d5a32">-VD</tspan></text>
    <text x="0" y="84" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="74" font-weight="800" letter-spacing="-3" fill="#1e1c1a">
      <tspan x="0" dy="0">Simulateur d’aides</tspan>
      <tspan x="0" dy="78">sociales dans le</tspan>
      <tspan x="0" dy="78">canton de Vaud</tspan>
    </text>
    <text x="0" y="338" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="30" font-weight="500" fill="#5f5852">
      <tspan x="0" dy="0">Un premier tri simple, gratuit et communautaire pour repérer</tspan>
      <tspan x="0" dy="42">les aides, ressources et démarches utiles.</tspan>
    </text>

    <g transform="translate(0 420)">
      <rect x="0" y="0" width="240" height="58" rx="29" fill="#2d5a32"/>
      <text x="120" y="37" text-anchor="middle" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Simulateur</text>
      <rect x="262" y="0" width="238" height="58" rx="29" fill="#ffffff" stroke="#e8ddd2" stroke-width="2"/>
      <text x="381" y="37" text-anchor="middle" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#2d5a32">Catalogue</text>
    </g>
  </g>
</svg>
